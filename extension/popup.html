<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JobFinder Sync</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; width: 320px; padding: 16px; margin: 0; background: #f8fafc; color: #0f172a; }
        h3 { margin-top: 0; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .icon { background: #2563eb; color: white; padding: 4px; border-radius: 4px; font-weight: bold; }
        label { font-size: 12px; font-weight: 500; margin-bottom: 4px; display: block; color: #475569; }
        input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 16px; font-size: 12px; }
        button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #status { font-size: 12px; margin-top: 12px; padding: 10px; border-radius: 6px; background: #e2e8f0; display: none; word-break: break-all; }
        .success { background: #dcfce3 !important; color: #166534; }
        .error { background: #fee2e2 !important; color: #991b1b; }
    </style>
</head>
<body>
    <h3><span class="icon">in</span> JobFinder Sync</h3>
    <p style="font-size: 12px; color: #64748b; margin-bottom: 16px;">
        Use esta extensão para buscar suas vagas recomendadas sem risco de bloqueio.
    </p>

    <label for="serverUrl">URL do Servidor App (Onde os dados serão enviados):</label>
    <input type="text" id="serverUrl" placeholder="Ex: http://localhost:3000" value="http://localhost:3000">

    <button id="syncBtn">Buscar Vagas Invisível</button>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
