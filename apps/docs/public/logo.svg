<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="briefcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#0077b5" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow Blob -->
  <circle cx="100" cy="108" r="65" fill="#0077b5" opacity="0.15" filter="url(#glow)" />

  <!-- Briefcase Handle -->
  <path d="M 75,60 C 75,35 125,35 125,60" fill="none" stroke="url(#glowGrad)" stroke-width="8" stroke-linecap="round" />

  <!-- Briefcase Body -->
  <rect x="40" y="60" width="120" height="90" rx="14" fill="url(#briefcaseGrad)" stroke="url(#glowGrad)" stroke-width="4" />
  
  <!-- Briefcase Clasp -->
  <rect x="90" y="60" width="20" height="15" rx="4" fill="#1e293b" stroke="url(#glowGrad)" stroke-width="3" />

  <!-- Magnifying Glass (glowing overlay) -->
  <g filter="url(#glow)">
    <!-- Lens Frame -->
    <circle cx="100" cy="105" r="32" fill="none" stroke="#e2ff6f" stroke-width="8" />
    <!-- Handle -->
    <line x1="123" y1="128" x2="148" y2="153" stroke="#e2ff6f" stroke-width="8" stroke-linecap="round" />
    <!-- Inner Lens highlight -->
    <path d="M 82,92 A 25,25 0 0,1 112,82" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>
