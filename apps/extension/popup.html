<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>JobFinder Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 310px;
      padding: 18px;
      background: #f1f5f9;
      color: #0f172a;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .logo {
      background: #0a66c2;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
    }
    h3 { font-size: 15px; font-weight: 700; }

    p.subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .5px;
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 12px;
      background: #fff;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #0a66c2; }

    button#syncBtn {
      width: 100%;
      padding: 11px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button#syncBtn:hover    { background: #004a9f; }
    button#syncBtn:disabled { opacity: .5; cursor: not-allowed; }

    #status {
      font-size: 12px;
      margin-top: 12px;
      padding: 11px 13px;
      border-radius: 8px;
      background: #e2e8f0;
      display: none;
      white-space: pre-line;
      line-height: 1.6;
      word-break: break-word;
    }
    #status.success { background: #dcfce7; color: #14532d; }
    #status.error   { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">in</span>
    <h3>JobFinder Sync</h3>
  </div>

  <p class="subtitle">
    Salva suas credenciais do LinkedIn no servidor para que o app
    possa buscar vagas com segurança, sem risco de bloqueio.
  </p>

  <label for="serverUrl">URL do Servidor</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:3000" value="http://localhost:3000">

  <button id="syncBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    Sincronizar Credenciais
  </button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
